apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service-deployment
  labels:
    app: event-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
      - name: event-service
        image: youracrname.azurecr.io/event-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: SQLALCHEMY_DATABASE_URL
          value: "sqlite:///./event.db" # Replace with Azure SQL string
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
spec:
  type: LoadBalancer
  selector:
    app: event-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
