apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
      - name: event-service
        image: 483624980035.dkr.ecr.eu-north-1.amazonaws.com/event-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: DATABASE_URL
          value: "postgresql://postgresadmin:Khushnaaz21@event-db-instance.c9226euwq9t0.eu-north-1.rds.amazonaws.com:5432/postgres?sslmode=require"

---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: event-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8002
